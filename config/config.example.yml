# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE 1: Jira + GitLab (Enterprise/Self-Hosted)
# ─────────────────────────────────────────────────────────────────────────────
# Common in enterprise teams using self-hosted GitLab with Jira for project
# management. Uses Kiro CLI as the AI agent.
# ─────────────────────────────────────────────────────────────────────────────

# issue_source:
#   type: jira
#   jira:
#     base_url: "https://jira.mycompany.com"
#     auth:
#       token_path: "~/.dev-agent-harness/secrets/jira-token"
#       type: bearer
#     project_key: "PLATFORM"
#     fields:
#       acceptance_criteria: "customfield_10300"
#       story_points: "customfield_10002"
#
# code_platform:
#   type: gitlab
#   gitlab:
#     base_url: "https://gitlab.mycompany.com"
#     api_url: "https://gitlab.mycompany.com/api/v4"
#     auth:
#       token_path: "~/.dev-agent-harness/secrets/gitlab-token"
#     default_branch: "development"
#     clone_protocol: https
#
# agent:
#   type: kiro-cli
#
# preferences:
#   ide: intellij
#   branch_prefix_feature: "feat"
#   branch_prefix_fix: "fix"
#   branch_separator: "/"
#   commit_format: conventional
#   review:
#     rules_path: "~/.dev-agent-harness/review-rules.yml"
#     post_comments: true
#     severity_labels:
#       required: "🔴 REQUIRED"
#       recommendation: "🟡 RECOMMENDATION"
#       suggestion: "🟢 SUGGESTION"


