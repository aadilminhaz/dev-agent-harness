# ═══════════════════════════════════════════════════════════════════════════════
# Dev Agent Harness — Configuration Schema
# ═══════════════════════════════════════════════════════════════════════════════
#
# This schema documents the structure of ~/.dev-agent-harness/config.yml
# generated by the installer (install.sh).
#
# All fields marked [required] must be present.
# Fields marked [optional] have default values shown.
#
# Schema Version: 1.0
# ═══════════════════════════════════════════════════════════════════════════════

schema_version: "1.0"

# ─── Issue Source ──────────────────────────────────────────────────────────────
# Defines where tickets/issues are fetched from.
issue_source:
  # [required] The issue tracking provider.
  # Valid values: jira | github | linear
  type: "jira | github | linear"

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │ Jira Configuration (used when type: jira)                                │
  # └─────────────────────────────────────────────────────────────────────────┘
  jira:
    # [required] Base URL of the Jira instance (no trailing slash).
    base_url: "https://your-jira.example.com"

    # [required] Authentication credentials.
    auth:
      # [required] Path to file containing the Jira token (PAT or bearer).
      # Supports ~ expansion. File should contain only the token string.
      # Permissions: must be readable by current user (chmod 600 recommended).
      token_path: "~/.dev-agent-harness/secrets/jira-token"

      # [optional] Auth type used in the Authorization header.
      # Valid values: bearer | basic | pat
      # Default: bearer
      type: "bearer"

    # [required] The Jira project key (e.g., "PROJ", "ENG", "PLATFORM").
    # Used to construct ticket IDs and filter queries.
    project_key: "PROJ"

    # [optional] Custom field mappings for Jira.
    fields:
      # Jira custom field ID for acceptance criteria.
      # Default: "customfield_10300"
      acceptance_criteria: "customfield_10300"

      # Jira custom field ID for story points.
      # Default: "customfield_10002"
      story_points: "customfield_10002"

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │ GitHub Issues Configuration (used when type: github)                     │
  # └─────────────────────────────────────────────────────────────────────────┘
  github:
    # [optional] GitHub API base URL. Only needed for GitHub Enterprise.
    # Default: "https://api.github.com"
    base_url: "https://api.github.com"

    # [required] Authentication credentials.
    auth:
      # [required] Path to file containing the GitHub token (PAT with repo scope).
      # If method is "gh-cli", this can be omitted — auth is handled by `gh` CLI.
      token_path: "~/.dev-agent-harness/secrets/github-token"

      # [optional] Auth method.
      # Valid values: token | gh-cli
      # "gh-cli" uses the authenticated `gh` CLI (no token file needed).
      # Default: token
      method: "token"

    # [required] Repository owner (user or organisation).
    owner: "your-org"

    # [required] Repository name.
    repo: "your-repo"

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │ Linear Configuration (used when type: linear)                            │
  # └─────────────────────────────────────────────────────────────────────────┘
  linear:
    # [optional] Linear API endpoint.
    # Default: "https://api.linear.app/graphql"
    base_url: "https://api.linear.app/graphql"

    # [required] Authentication credentials.
    auth:
      # [required] Path to file containing the Linear API key.
      token_path: "~/.dev-agent-harness/secrets/linear-token"

    # [required] Linear team identifier.
    team_key: "ENG"

# ─── Code Platform ────────────────────────────────────────────────────────────
# Defines where code is hosted and where branches/MRs/PRs are managed.
code_platform:
  # [required] The code hosting provider.
  # Valid values: gitlab | github
  type: "gitlab | github"

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │ GitLab Configuration (used when type: gitlab)                            │
  # └─────────────────────────────────────────────────────────────────────────┘
  gitlab:
    # [required] Base URL of the GitLab instance (no trailing slash).
    base_url: "https://gitlab.example.com"

    # [optional] GitLab API v4 URL. Derived from base_url if not specified.
    # Default: "{base_url}/api/v4"
    api_url: "https://gitlab.example.com/api/v4"

    # [required] Authentication credentials.
    auth:
      # [required] Path to file containing the GitLab Personal Access Token.
      # Requires scopes: api, read_repository
      token_path: "~/.dev-agent-harness/secrets/gitlab-token"

    # [optional] Default branch to target for MRs.
    # Default: "main"
    default_branch: "main"

    # [optional] Git clone protocol.
    # Valid values: https | ssh
    # Default: https
    clone_protocol: "https"

  # ┌─────────────────────────────────────────────────────────────────────────┐
  # │ GitHub Configuration (used when type: github)                            │
  # └─────────────────────────────────────────────────────────────────────────┘
  github:
    # [optional] GitHub API base URL. Only needed for GitHub Enterprise.
    # Default: "https://api.github.com"
    base_url: "https://api.github.com"

    # [required] Authentication credentials.
    auth:
      # [required] Path to file containing the GitHub token (PAT with repo scope).
      # If method is "gh-cli", this can be omitted.
      token_path: "~/.dev-agent-harness/secrets/github-token"

      # [optional] Auth method.
      # Valid values: token | gh-cli
      # Default: token
      method: "token"

    # [optional] Default branch to target for PRs.
    # Default: "main"
    default_branch: "main"

    # [optional] Git clone protocol.
    # Valid values: https | ssh
    # Default: https
    clone_protocol: "https"

# ─── Agent ────────────────────────────────────────────────────────────────────
# Defines which AI coding agent is being used.
agent:
  # [required] The AI agent type.
  # Valid values: kiro-cli | claude-code | codex
  # Determines:
  #   - How skills are installed (file format, target directories)
  #   - Runtime tool-calling patterns
  #   - MCP configuration format
  type: "kiro-cli | claude-code | codex"

# ─── Preferences ──────────────────────────────────────────────────────────────
# User preferences for workflow behaviour.
preferences:
  # [optional] IDE to open after cloning/branching.
  # Valid values: intellij | vscode | cursor | none
  # Default: vscode
  # Mapped to commands:
  #   intellij → open -a "IntelliJ IDEA" .
  #   vscode   → code .
  #   cursor   → cursor .
  #   none     → skip (no IDE opened)
  ide: "vscode"

  # [optional] Prefix for feature branches.
  # Default: "feat"
  # Example branch: feat/PROJ-1234
  branch_prefix_feature: "feat"

  # [optional] Prefix for fix/bugfix branches.
  # Default: "fix"
  # Example branch: fix/PROJ-5678
  branch_prefix_fix: "fix"

  # [optional] Separator between prefix and ticket ID in branch names.
  # Valid values: "/" | "-"
  # Default: "/"
  branch_separator: "/"

  # [optional] Commit message format.
  # Valid values: conventional | simple
  # Default: conventional
  # conventional: "feat: PROJ-123 short description"
  # simple: "PROJ-123: short description"
  commit_format: "conventional"

  # [optional] MR/PR review settings.
  review:
    # Path to custom review rules file.
    # Default: "~/.dev-agent-harness/review-rules.yml"
    rules_path: "~/.dev-agent-harness/review-rules.yml"

    # Whether to post review comments directly on the MR/PR.
    # Default: true
    post_comments: true

    # Severity label formatting for review comments.
    severity_labels:
      required: "🔴 REQUIRED"
      recommendation: "🟡 RECOMMENDATION"
      suggestion: "🟢 SUGGESTION"

# ═══════════════════════════════════════════════════════════════════════════════
# Notes
# ═══════════════════════════════════════════════════════════════════════════════
#
# File Location:
#   The generated config lives at: ~/.dev-agent-harness/config.yml
#   This is an agent-agnostic location — all agents read from the same path.
#
# Secrets:
#   All tokens are stored in separate files under ~/.dev-agent-harness/secrets/
#   with restrictive permissions (chmod 600). The config references paths to
#   these files — never inline secrets.
#
#   ~/.dev-agent-harness/
#   ├── config.yml
#   ├── review-rules.yml
#   └── secrets/
#       ├── .gitignore          # contains "*" — never committed
#       ├── gitlab-token
#       ├── github-token
#       ├── jira-token
#       └── linear-token
#
# Validation:
#   Only the provider-specific block needs to be populated.
#   e.g., if issue_source.type = "jira", only issue_source.jira is required.
#   The github and linear blocks can be omitted entirely.
#
# Runtime Resolution:
#   Skills read this file at the start of every execution. The flow is:
#   1. Read config.yml
#   2. Check issue_source.type → load corresponding sub-block
#   3. Check code_platform.type → load corresponding sub-block
#   4. Read token from the file path specified in auth.token_path
#   5. Proceed with platform-specific API calls
#
# ═══════════════════════════════════════════════════════════════════════════════
